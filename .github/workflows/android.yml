name: Android APK Build (Capacitor)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build Android App via Capacitor
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run TypeScript Linter Check
      run: npm run lint

    - name: Compile Production Web Assets
      run: npm run build
      env:
        NODE_ENV: production

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Sync Capacitor Web Assets to Native Project
      run: |
        npx cap sync android

    - name: Repair Corrupt Gradle Wrapper JAR
      run: |
        mkdir -p /tmp/gradle-repair
        cd /tmp/gradle-repair
        touch settings.gradle
        gradle wrapper --gradle-version 8.2.1
        cd $GITHUB_WORKSPACE
        mkdir -p android/gradle/wrapper
        cp /tmp/gradle-repair/gradle/wrapper/gradle-wrapper.jar android/gradle/wrapper/gradle-wrapper.jar
        cp /tmp/gradle-repair/gradle/wrapper/gradle-wrapper.properties android/gradle/wrapper/gradle-wrapper.properties
        cp /tmp/gradle-repair/gradlew android/gradlew

    - name: Build Android Release APK via Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Sign Android APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: android/app/build/outputs/apk/release
        signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
        alias: ${{ secrets.ANDROID_KEY_ALIAS }}
        keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
      continue-on-error: true

    - name: Upload Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SafetyLink-Capacitor-Release-APK
        path: |
          android/app/build/outputs/apk/release/*.apk
          android/app/build/outputs/bundle/release/*.aab
