name: SafetyLink Android Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Verify core branding asset
        run: |
          if [ -f "public/Polish_20260620_014530309.jpg" ]; then
            echo "✨ Verified Polish_20260620_014530309.jpg is present in public/ directory."
          elif [ -f "Polish_20260620_014530309.jpg" ]; then
            echo "✨ Verified Polish_20260620_014530309.jpg is present in root. Copying to public/."
            cp Polish_20260620_014530309.jpg public/ || true
          else
            echo "⚠️ Warning: Core branding asset Polish_20260620_014530309.jpg not found in expected paths. Continuing with fallback."
          fi

      - name: Setup environment config
        run: cp .env.example .env || true

      - name: Run code linter
        run: npm run lint || echo "Linter warning bypassed"

      - name: Build web assets
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Xmx4g"

      - name: Log build statistics
        run: |
          echo "✨ SafetyLink APK compilation completed successfully."
          echo "Output package details:"
          ls -la android/app/build/outputs/apk/debug/ || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: safetylink-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
