name: SafetyLink CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 'latest'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Cordova globally
        run: npm install -g cordova@latest

      - name: Install project dependencies
        run: npm install

      - name: Add Android platform
        run: cordova platform add android@latest

      - name: Prepare Cordova
        run: cordova prepare android

      - name: Build Debug APK
        run: cordova build android --debug
        env:
          GRADLE_OPTS: "-Xmx4g"

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: safetylink-debug-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
