name: SafetyLink Fastlane Beta Deployment

on:
  push:
    tags:
      - 'v*.*.*-beta*'

jobs:
  deploy:
    name: Build & Distribute Beta APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'
        cache: 'gradle'

    - name: Set up Ruby (Fastlane)
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundle-cache: true

    - name: Decode Signing Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > my-upload-key.jks
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    - name: Set up Environment configuration
      run: cp .env.example .env || true

    - name: Install Fastlane Plugins
      run: |
        gem install fastlane
        fastlane add_plugin firebase_app_distribution

    - name: Run Fastlane Beta Lane
      run: bundle exec fastlane beta
      env:
        KEYSTORE_PATH: "../my-upload-key.jks"
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        FIREBASE_CLI_TOKEN: ${{ secrets.FIREBASE_CLI_TOKEN }}
