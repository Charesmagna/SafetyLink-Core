name: SafetyLink Android APK Build Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-apk:
    name: Build SafetyLink Signed Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci || npm install

      - name: Compile React Frontend SPA
        run: npm run build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Sync Capacitor Native Assets
        run: |
          npx cap sync android

      - name: Configure Gradle Wrapper Permissions
        run: |
          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
          fi

      - name: Build Android Release APK
        run: |
          cd android
          if [ -f "gradlew" ]; then
            ./gradlew assembleRelease --no-daemon
          fi

      - name: Archive Production APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: safetylink-release-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 14
