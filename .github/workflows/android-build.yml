name: SafetyLink Android APK Build Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build SafetyLink Android APK
    runs-on: ubuntu-latest

    env:
      NODE_ENV: production

    steps:
      # 1. Checkout full repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Node setup
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Install JS dependencies
      - name: Install Dependencies
        run: npm ci || npm install

      # 4. Build web assets (Capacitor input)
      - name: Build Web App
        run: npm run build

      # 5. Java setup (required for Gradle 8.13 + AGP 8.8)
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      # 6. Explicit Gradle 8.13 enforcement (CRITICAL FIX)
      - name: Setup Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.13

      # 7. Capacitor sync (MUST happen before Android build)
      - name: Sync Capacitor Android
        run: npx cap sync android

      # 8. Ensure wrapper is executable (fixes runner permission issues)
      - name: Fix Gradle Wrapper Permissions
        run: chmod +x android/gradlew

      # 9. Debug verification (optional but stabilizes CI visibility)
      - name: Verify Gradle Wrapper
        run: |
          cd android
          ./gradlew --version

      # 10. Build APK (FORCED WRAPPER USAGE)
      - name: Build Release APK
        run: |
          cd android
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon --stacktrace

      # 11. Upload artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SafetyLink-Release-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
