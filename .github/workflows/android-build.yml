name: Android APK Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install root dependencies
        run: npm ci

      - name: Install Cordova 12
        run: npm install -g cordova@12

      - name: Add Android platform
        run: cordova platform add android@13.0.0

      - name: Add plugins (exact versions)
        run: |
          cordova plugin add cordova-plugin-device@2.1.0
          cordova plugin add cordova-plugin-network-information@3.0.0
          cordova plugin add cordova-plugin-geolocation@4.1.0
          cordova plugin add cordova-plugin-dialogs@2.0.2
          cordova plugin add cordova-plugin-vibration@3.1.1
          cordova plugin add cordova-plugin-statusbar@3.0.0
          cordova plugin add cordova-plugin-splashscreen@6.0.2
          cordova plugin add cordova-plugin-whitelist@1.3.5
          cordova plugin add cordova-plugin-bluetoothle@7.1.3
          cordova plugin add cordova-plugin-advanced-http@3.3.1
          cordova plugin add cordova-plugin-firebase-messaging@18.0.0
          cordova plugin add cordova-plugin-background-mode@0.7.3
          cordova plugin add phonegap-plugin-push@2.3.0
          cordova plugin add cordova-plugin-call-number@1.0.1
          cordova plugin add cordova-plugin-android-permissions@1.1.5

      - name: Write config values
        run: |
          sed -i "s|https://yourdomain.com|${{ secrets.BACKEND_URL }}|g" www/js/app.js || true
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}

      - name: Build release APK
        run: cordova build android --release
        env:
          ANDROID_HOME:   /usr/local/lib/android/sdk
          FCM_SERVER_KEY: ${{ secrets.FCM_SERVER_KEY }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: safetylink-v5-release-apk
          path: platforms/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
