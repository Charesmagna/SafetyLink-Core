name: Android APK Build (SafetyLink Production-Ready)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK via GitHub Actions
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Codebase
      uses: actions/checkout@v4

    - name: Set up Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install Application Dependencies
      run: npm install

    - name: Compile and Build Web Assets
      run: npm run build
      env:
        NODE_ENV: production

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK Build Tools
      uses: android-actions/setup-android@v3

    - name: Sync Capacitor Native Android Assets
      run: |
        npx cap sync android

    - name: Repair Corrupt Gradle Wrapper JAR
      run: |
        cd android
        [ -f settings.gradle ] && mv settings.gradle settings.gradle.bak || true
        [ -f build.gradle ] && mv build.gradle build.gradle.bak || true
        [ -f app/build.gradle ] && mv app/build.gradle app/build.gradle.bak || true
        gradle wrapper --gradle-version 8.2.1
        [ -f settings.gradle.bak ] && mv settings.gradle.bak settings.gradle || true
        [ -f build.gradle.bak ] && mv build.gradle.bak build.gradle || true
        [ -f app/build.gradle.bak ] && mv app/build.gradle.bak app/build.gradle || true

    - name: Build Android Release APK via Gradle Wrapper
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon

    - name: Upload Release APK as Run Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SafetyLink-Release-APK
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
        if-no-files-found: error
