name: SafetyLink Production Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Codebase
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci   # Use ci instead of install for CI

    - name: Compile Web Assets
      run: npm run build
      env:
        NODE_ENV: production

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'   # Much better than manual wrapper restore

    - name: Accept Android SDK Licenses
      run: |
        echo "y" | $ANDROID_HOME/tools/bin/sdkmanager --licenses
        echo "y" | $ANDROID_HOME/tools/bin/sdkmanager --update

    - name: Sync Capacitor Native Android Assets
      run: npx cap sync android

    - name: Build Android Release APK
      run: |
        cd android
        ./gradlew assembleRelease --no-daemon --stacktrace

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: SafetyLink-Release-APK
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
        if-no-files-found: error
