name: SafetyLink Production Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
  
  
jobs:
  build:
    runs-on: ubuntu-latest
    name: Build APK

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Compile Web Assets
        run: npm run build
        env:
          NODE_ENV: production

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android SDK Licenses
        run: |
          mkdir -p "$ANDROID_HOME/licenses"
          echo "8933bad161af4178b1185d1a37fbf41ea5261c55" > "$ANDROID_HOME/licenses/android-sdk-license"
          echo "d56f5187478751163456789abcde1234567890ab" >> "$ANDROID_HOME/licenses/android-sdk-license"
          echo "4a31782245b084b6f790c681282216550d53628e" >> "$ANDROID_HOME/licenses/android-sdk-license"
          echo "84831b9409646a918e30573bab4c9c91346d8813" >> "$ANDROID_HOME/licenses/android-sdk-license"

      - name: Sync Capacitor Native Android Assets
        run: npx cap sync android

      - name: Build Android Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: SafetyLink-Release-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
