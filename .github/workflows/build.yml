name: SafetyLink Build & CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build & Verify (Web + Android)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js (v20)
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install NPM Dependencies
      run: npm install

    - name: Run Type Checks and Production Web Build
      run: npm run build

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'
        cache: 'gradle'

    - name: Sync Capacitor Android Project
      run: npx cap sync android

    - name: Grant Execute Permissions and Verify Gradle Wrapper
      run: |
        chmod +x gradlew
        ./gradlew --version

    - name: Create Env File from Example
      run: cp .env.example .env || true

    - name: Compile and Assemble Android Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload Web Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: safetylink-web-dist
        path: dist/

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: safetylink-core-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
