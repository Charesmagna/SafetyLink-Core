name: SafetyLink Hardened Android Build Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build SafetyLink APK (Capacitor)
    runs-on: ubuntu-latest

    env:
      NODE_ENV: production

    steps:
    # -----------------------------
    # 1. Checkout
    # -----------------------------
    - name: Checkout Repository
      uses: actions/checkout@v4

    # -----------------------------
    # 2. Setup Node (Updated to match runner baseline)
    # -----------------------------
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    # -----------------------------
    # 3. Install Dependencies
    # -----------------------------
    - name: Install Dependencies
      run: |
        npm ci --legacy-peer-deps

    # -----------------------------
    # 4. Build Web Layer
    # -----------------------------
    - name: Build Web App
      run: npm run build

    # -----------------------------
    # 5. Setup Java (Required for Gradle)
    # -----------------------------
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: "17"

    # -----------------------------
    # 6. Setup Android SDK
    # -----------------------------
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # -----------------------------
    # 7. Sync Capacitor Bridge
    # -----------------------------
    - name: Sync Web Assets to Android Container
      run: |
        npx cap sync android

    # -----------------------------
    # 8. Build Android APK via Gradle
    # -----------------------------
    - name: Build Release APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease

    # -----------------------------
    # 9. Upload Production Artifacts
    # -----------------------------
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SafetyLink-APK
        path: |
          android/app/build/outputs/apk/release/*.apk
          android/app/build/outputs/bundle/release/*.aab

    # -----------------------------
    # 10. Upload Debug Logs on Failure
    # -----------------------------
    - name: Upload Build Logs (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          ~/.npm/_logs/
          android/app/build/reports/
