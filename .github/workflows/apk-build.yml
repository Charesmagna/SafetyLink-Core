name: Android APK Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build Android Release APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install Base Dependencies
      run: npm ci

    - name: Build Web Application
      run: npm run build
      env:
        NODE_ENV: production

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Capacitor CLI & Copy Web Assets
      run: |
        npx cap copy android
        npx cap sync android

    - name: Build Android Release APK with Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Sign APK (Optional for distribution)
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: android/app/build/outputs/apk/release
        signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
        alias: ${{ secrets.ANDROID_KEY_ALIAS }}
        keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
      continue-on-error: true

    - name: Upload Build Artifact (Signed/Unsigned APK)
      uses: actions/upload-artifact@v3
      with:
        name: SafetyLink-Release-APK
        path: |
          android/app/build/outputs/apk/release/*.apk
          android/app/build/outputs/bundle/release/*.aab
