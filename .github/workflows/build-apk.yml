name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Build Web App
      run: npm run build
    - name: Sync Capacitor
      run: npm run cap:sync
    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew
    - name: Stop Daemons
      run: cd android && ./gradlew --stop || true
    - name: Clean Gradle Cache
      run: rm -rf ~/.gradle/caches && rm -rf ${{ github.workspace }}/.gradle/caches
    - name: Build with Gradle (Debug)
      working-directory: ./android
      run: ./gradlew clean assembleDebug --no-daemon --no-parallel --no-build-cache
    - name: Build with Gradle (Release)
      working-directory: ./android
      run: ./gradlew clean assembleRelease --no-daemon --no-parallel --no-build-cache
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/*.apk
    - name: Upload Unsigned Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-unsigned
        path: android/app/build/outputs/apk/release/*-unsigned.apk
