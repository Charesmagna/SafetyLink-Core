name: SafetyLink Hardened Android Build Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  build:
    name: Build SafetyLink APK (Hardened)
    runs-on: ubuntu-latest

    env:
      NODE_ENV: production

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm

    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install Dependencies (Safe Install)
      run: |
        npm install --legacy-peer-deps

    - name: Build Web App
      run: npm run build

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: "17"

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-levels: 33
        build-tools: 33.0.2
        components: platform-tools

    - name: Install Cordova CLI
      run: npm install -g cordova

    - name: Prepare Android Platform
      run: |
        if [ ! -d "platforms/android" ]; then
          cordova platform add android
        fi

    - name: Sync Capacitor/Cordova Assets
      run: |
        if [ -f "capacitor.config.ts" ] || [ -f "capacitor.config.json" ]; then
          npx cap sync android || true
        fi
        cordova prepare android

    - name: Build Release APK
      run: |
        cd platforms/android
        chmod +x gradlew || true
        ./gradlew assembleRelease

    - name: Decode keystore and sign APK(s)
      if: ${{ secrets.KEYSTORE_BASE64 != '' && secrets.KEYSTORE_PASSWORD != '' && secrets.KEY_ALIAS != '' && secrets.KEY_PASSWORD != '' }}
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      run: |
        set -e
        echo "Decoding keystore..."
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.jks
        APKSIGNER=$(find $ANDROID_SDK_ROOT -type f -name apksigner | head -n1 || true)
        if [ -z "$APKSIGNER" ]; then
          APKSIGNER=$(ls $ANDROID_SDK_ROOT/build-tools/*/apksigner 2>/dev/null | head -n1 || true)
        fi
        echo "Using apksigner: $APKSIGNER"
        for apk in platforms/android/app/build/outputs/apk/release/*.apk; do
          if [ -f "$apk" ]; then
            echo "Signing $apk"
            "$APKSIGNER" sign --ks release.jks --ks-key-alias "${KEY_ALIAS}" --ks-pass pass:${KEYSTORE_PASSWORD} --key-pass pass:${KEY_PASSWORD} "$apk"
          fi
        done

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SafetyLink-APK
        path: |
          platforms/android/app/build/outputs/apk/release/*.apk
          platforms/android/app/build/outputs/bundle/release/*.aab

    - name: Upload Build Logs (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          ~/.npm/_logs/
          platforms/android/build/**/*.log
