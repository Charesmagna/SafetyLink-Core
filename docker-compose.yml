version: '3.8'

services:
  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - postgres
      - ntfy
      - owncloud

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: safetylink
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  ntfy:
    image: binwiederhier/ntfy
    command: serve
    ports:
      - "2586:80"

  owncloud:
    image: owncloud/server:latest
    ports:
      - "8080:8080"
    environment:
      - OWNCLOUD_DOMAIN=localhost:8080
      - OWNCLOUD_ADMIN_USERNAME=admin
      - OWNCLOUD_ADMIN_PASSWORD=admin
    volumes:
      - owncloud_data:/mnt/data

volumes:
  pgdata:
  owncloud_data:
