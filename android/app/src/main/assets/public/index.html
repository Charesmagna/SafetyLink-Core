    <style>
      /* Ensure leaflet markers render nicely */
      .leaflet-container {
        font-family: 'Inter', sans-serif;
      }
      /* Custom map pulse animations */
      @keyframes mapPulse {
        0% {
          transform: scale(0.9);
          opacity: 1;
        }
        70% {
          transform: scale(2.2);
          opacity: 0;
        }
        100% {
          transform: scale(0.9);
          opacity: 0;
        }
      }
      .pulse-marker-active {
        width: 14px;
        height: 14px;
        background: #ef4444;
        border-radius: 50%;
        box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.4);
        position: relative;
      }
      .pulse-marker-active::after {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: #ef4444;
        animation: mapPulse 1.8s infinite ease-out;
      }
      .pulse-marker-escalated {
        width: 14px;
        height: 14px;
        background: #f59e0b;
        border-radius: 50%;
        box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.4);
        position: relative;
      }
      .pulse-marker-escalated::after {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: #f59e0b;
        animation: mapPulse 1.8s infinite ease-out;
      }
    </style>
